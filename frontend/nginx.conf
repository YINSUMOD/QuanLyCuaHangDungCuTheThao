# ============================================================
# Cấu hình Nginx GỘP: phục vụ CẢ web bán hàng và hệ thống quản trị
#   /          -> Web bán hàng (SPA React)
#   /quan-ly   -> Hệ thống quản trị (SPA React)
#   /api       -> Chuyển tiếp (reverse proxy) sang backend
#   /anh       -> Ảnh sản phẩm tĩnh
# ============================================================

server {
  listen 80;                          # Lắng nghe cổng 80 (HTTP) trong container
  server_name _;                      # Khớp mọi tên miền (catch-all)
  root /usr/share/nginx/html;         # Thư mục gốc chứa file tĩnh đã build
  index index.html;                   # File mặc định khi truy cập thư mục
  absolute_redirect off;              # Dùng redirect TƯƠNG ĐỐI để không mất cổng (vd :8080) khi chuyển /quan-ly -> /quan-ly/

  # ----- Gọi API backend -----
  # Mọi request /api/... được chuyển tới service "backend" (Docker) cổng 5000
  location /api/ {
    proxy_pass http://backend:5000;        # Địa chỉ backend trong mạng nội bộ Docker
    proxy_http_version 1.1;                 # Dùng HTTP/1.1 (keep-alive)
    proxy_set_header Host $host;            # Giữ header Host gốc của client
    proxy_set_header X-Real-IP $remote_addr; # Truyền IP thật của client cho backend
  }

  # ----- Ảnh sản phẩm tĩnh -----
  # Phục vụ trực tiếp từ /usr/share/nginx/html/anh; không có thì trả 404
  location /anh/ {
    try_files $uri =404;
  }

  # ----- Hệ thống quản trị tại /quan-ly -----
  # Truy cập /quan-ly (thiếu dấu /) -> chuyển hướng thêm dấu / cho đúng base
  location = /quan-ly {
    return 301 /quan-ly/;
  }
  # SPA quản trị: thử file/thư mục theo URL, nếu không có thì trả index.html của /quan-ly
  location /quan-ly/ {
    try_files $uri $uri/ /quan-ly/index.html;
  }

  # ----- Web bán hàng tại / -----
  # SPA bán hàng: thử file/thư mục theo URL, nếu không có thì trả index.html ở gốc
  location / {
    try_files $uri $uri/ /index.html;
  }
}
